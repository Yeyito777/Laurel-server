server {
    server_name clips.yeyito.dev;

    root /srv/clips;
    index index.html;

    # Serve clip directories (each has index.html + clip.mp4 + thumb.jpg)
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Video files: cache-friendly headers
    location ~* \.(mp4|webm|mkv)$ {
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Thumbnails
    location ~* \.(jpg|png)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/clips.yeyito.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clips.yeyito.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name clips.yeyito.dev;
    return 301 https://$host$request_uri;
}
